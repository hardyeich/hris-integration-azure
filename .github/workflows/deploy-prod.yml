name: Deploy to Prod
on:
  push:
    branches:
      - main
    paths:
      - 'aaccounts/aa-oracle-automation/test_*.ps1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: true

      - name: Deploy Prod runbooks
        uses: azure/powershell@v1
        with:
          azPSVersion: latest
          inlineScript: |
            $subId      = (Get-AzContext).Subscription.Id
            $aa         = "${{ secrets.AUTOMATION_ACCOUNT }}"
            $rg         = "${{ secrets.RESOURCE_GROUP }}"
            $env        = "ps7_plus_aztable"
            $loc        = "${{ secrets.AUTOMATION_LOCATION }}"
            $apiVersion = "2024-10-23"

            $files = Get-ChildItem "aaccounts/aa-oracle-automation/test_*.ps1"
            Write-Output "Found $($files.Count) runbook(s) to deploy"

            foreach ($file in $files) {
                $prodName = $file.BaseName -replace '^test_', ''
                $content  = Get-Content $file.FullName -Raw

                Write-Output "Deploying: $($file.Name) -> $prodName"

                $putPath = "/subscriptions/$subId/resourceGroups/$rg" +
                           "/providers/Microsoft.Automation/automationAccounts/$aa" +
                           "/runbooks/$prodName" +
                           "?api-version=$apiVersion"

                $putBody = @{
                    location   = $loc
                    properties = @{
                        runbookType        = "PowerShell"
                        runtimeEnvironment = $env
                        description        = "Deployed $(Get-Date -Format 'yyyy-MM-dd HH:mm') via GitHub Actions"
                    }
                } | ConvertTo-Json -Depth 5

                $r1 = Invoke-AzRestMethod -Method PUT -Path $putPath -Payload $putBody
                if ($r1.StatusCode -notin 200,201) {
                    Write-Warning "Definition failed for $prodName : $($r1.StatusCode)"
                    continue
                }

                $draftPath = "/subscriptions/$subId/resourceGroups/$rg" +
                             "/providers/Microsoft.Automation/automationAccounts/$aa" +
                             "/runbooks/$prodName/draft/content" +
                             "?api-version=$apiVersion"

                $r2 = Invoke-AzRestMethod -Method PUT -Path $draftPath -Payload $content
                if ($r2.StatusCode -notin 200,201,202) {
                    Write-Warning "Content failed for $prodName : $($r2.StatusCode)"
                    continue
                }

                $publishPath = "/subscriptions/$subId/resourceGroups/$rg" +
                               "/providers/Microsoft.Automation/automationAccounts/$aa" +
                               "/runbooks/$prodName/publish" +
                               "?api-version=$apiVersion"

                $r3 = Invoke-AzRestMethod -Method POST -Path $publishPath -Payload '{}'

                if ($r3.StatusCode -in 200,202) {
                    Write-Output "✅ Published: $prodName"
                } else {
                    Write-Warning "❌ Failed: $prodName : $($r3.StatusCode)"
                }
            }